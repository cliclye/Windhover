# Build an Apple Silicon Windhover .dmg and attach it to a GitHub Release.
#
# Trigger: push a version tag (v0.1.0) or run manually from Actions.
# Asset name is stable so website / README can use:
#   https://github.com/cliclye/Kestrel/releases/latest/download/Windhover-macOS-arm64.dmg
#
# Signing / notarization: intentionally omitted. Without Apple Developer
# secrets this ships an *unsigned* DMG — users must bypass Gatekeeper once
# (see docs/DOWNLOAD.md). Add APPLE_* secrets later to enable signing.

name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub Release tag to upload into (e.g. v0.1.0)"
        required: true
        default: "v0.3.4"

permissions:
  contents: write

jobs:
  dmg:
    name: Build DMG (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install app frontend deps
        working-directory: app
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build Windhover .app
        working-directory: desktop
        # Unsigned Developer ID — we ad-hoc codesign next so Gatekeeper does not
        # report the misleading "damaged and can't be opened" error.
        run: cargo tauri build --bundles app --target aarch64-apple-darwin

      - name: Ad-hoc codesign app bundle
        run: |
          set -euo pipefail
          APP="$(find desktop/src-tauri/target -path '*/release/bundle/macos/*.app' -type d | head -n 1)"
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "No .app found under desktop/src-tauri/target" >&2
            find desktop/src-tauri/target -type d -name '*.app' 2>/dev/null || true
            exit 1
          fi
          echo "Signing: $APP"
          # Replace linker-only adhoc signature with a full bundle signature
          # (Sealed Resources). Without this, macOS often says the download is "damaged".
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict "$APP"
          codesign -dv --verbose=2 "$APP" 2>&1 | tee /tmp/windhover-codesign.txt
          grep -q 'Sealed Resources version=' /tmp/windhover-codesign.txt
          echo "Ad-hoc codesign OK"

      - name: Package signed .app into DMG
        run: |
          set -euo pipefail
          APP="$(find desktop/src-tauri/target -path '*/release/bundle/macos/*.app' -type d | head -n 1)"
          test -d "$APP"
          mkdir -p dist
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/Windhover.app"
          ln -s /Applications "$STAGE/Applications"
          # Re-assert signature after copy
          codesign --force --deep --sign - "$STAGE/Windhover.app"
          codesign --verify --deep --strict "$STAGE/Windhover.app"
          RM_DMG=dist/Windhover-macOS-arm64.dmg
          rm -f "$RM_DMG"
          hdiutil create \
            -volname "Windhover" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "$RM_DMG"
          rm -rf "$STAGE"
          ls -lh "$RM_DMG"
          hdiutil verify "$RM_DMG"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windhover-macOS-arm64
          path: dist/Windhover-macOS-arm64.dmg

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/Windhover-macOS-arm64.dmg
          fail_on_unmatched_files: true
          make_latest: true
          generate_release_notes: true
          body: |
            ## Windhover 0.3.6

            In-app updates from GitHub Releases; Windows Chat no longer requires torch after Library download. See [CHANGELOG.md](https://github.com/cliclye/Windhover/blob/main/CHANGELOG.md).

            ## Download

            ### macOS
            **[Windhover-macOS-arm64.dmg](https://github.com/cliclye/Windhover/releases/latest/download/Windhover-macOS-arm64.dmg)** — Apple Silicon · macOS 12+

            ### Windows 11
            **[Windhover-Windows-x64.exe](https://github.com/cliclye/Windhover/releases/latest/download/Windhover-Windows-x64.exe)** — Intel/AMD 64-bit
            **[Windhover-Windows-arm64.exe](https://github.com/cliclye/Windhover/releases/latest/download/Windhover-Windows-arm64.exe)** — Snapdragon / ARM64

            ### First launch
            - **macOS:** if Gatekeeper says the app is **“damaged”**, run `xattr -cr /Applications/Windhover.app` (not a corrupt download — see [docs/DOWNLOAD.md](https://github.com/cliclye/Windhover/blob/main/docs/DOWNLOAD.md))
            - **Windows:** unsigned — SmartScreen may require More info → Run anyway

            ### What's new (0.3.6)
            - Windows: Chat after Library install uses windhover-engine (no `pip install torch`)
            - Windows: torch-free KPK convert (numpy/safetensors) for Phi/Gemma packs
            - Packaging selfcheck covers download + convert + chat routing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
