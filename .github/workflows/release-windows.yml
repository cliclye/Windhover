# Build Windhover Windows NSIS installers (x64 + ARM64) and attach to GitHub Releases.
#
# Stable assets:
#   Windhover-Windows-x64.exe
#   Windhover-Windows-arm64.exe
#
# Unsigned — SmartScreen may warn until Authenticode secrets exist (see docs/DOWNLOAD.md).

name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub Release tag to upload into (e.g. v0.1.0)"
        required: true
        default: "v0.3.6"

permissions:
  contents: write

jobs:
  nsis:
    name: Build NSIS (${{ matrix.asset }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            triple: x86_64-pc-windows-msvc
            msystem: UCRT64
            msys_env: ucrt64
            arch: x86-64-v3
            asset: Windhover-Windows-x64.exe
            # OpenMP via gcc-libs (libgomp); *-openmp package name is gone on UCRT64.
            pacman: mingw-w64-ucrt-x86_64-gcc make
          - runner: windows-11-arm
            triple: aarch64-pc-windows-msvc
            msystem: CLANGARM64
            msys_env: clangarm64
            arch: armv8-a
            asset: Windhover-Windows-arm64.exe
            pacman: mingw-w64-clang-aarch64-clang mingw-w64-clang-aarch64-llvm-openmp make

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          key: win-${{ matrix.triple }}

      - name: Setup MSYS2 (engine toolchain)
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: ${{ matrix.pacman }}

      - name: Build windhover-engine
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export PATH="/${{ matrix.msys_env }}/bin:$PATH"
          cd engine
          make -j"$(nproc)" ARCH=${{ matrix.arch }}
          test -f windhover-engine.exe
          ls -lh windhover-engine.exe

      - name: Engine oracle smoke
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export PATH="/${{ matrix.msys_env }}/bin:$PATH"
          cd engine
          make test-oracle ARCH=${{ matrix.arch }}

      - name: Install app frontend deps + build
        working-directory: app
        run: |
          npm ci
          npm run build

      - name: Build windhover-server sidecar
        env:
          WINDHOVER_SERVER_CONSOLE: "1"
        run: |
          python -m pip install -q pyinstaller "huggingface_hub>=0.23" "httpx>=0.23" filelock fsspec PyYAML tqdm packaging click hf-xet numpy safetensors ml_dtypes
          powershell -File packaging/build_sidecar.ps1 -Triple ${{ matrix.triple }}
          Test-Path "desktop/src-tauri/binaries/windhover-server-${{ matrix.triple }}.exe"
          Test-Path "desktop/src-tauri/binaries/windhover-engine-${{ matrix.triple }}.exe"

      - name: Server /health smoke
        env:
          WINDHOVER_HOST: 127.0.0.1
          WINDHOVER_PORT: "8000"
          WINDHOVER_APP_NO_AUTOPULL: "1"
          WINDHOVER_ENGINE: ${{ github.workspace }}\desktop\src-tauri\binaries\windhover-engine-${{ matrix.triple }}.exe
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: |
          $server = Join-Path $env:GITHUB_WORKSPACE "packaging\dist\windhover-server.exe"
          if (-not (Test-Path $server)) { throw "missing $server" }
          # Do NOT RedirectStandardOutput+Error to the same file — Start-Process
          # fails immediately on Windows when both point at one path.
          $proc = Start-Process -FilePath $server -PassThru -WindowStyle Hidden
          try {
            $ok = $false
            for ($i = 0; $i -lt 90; $i++) {
              if ($proc.HasExited) {
                throw "windhover-server exited early code=$($proc.ExitCode)"
              }
              try {
                # curl.exe is more reliable than Invoke-WebRequest on GHA Windows
                # (IWR often reports ResponseEnded on keep-alive / HTTP/1.0 quirks).
                $body = & curl.exe -sS --max-time 3 "http://127.0.0.1:8000/health" 2>$null
                if ($LASTEXITCODE -eq 0 -and $body -match '"ok"') { $ok = $true; break }
              } catch { }
              Start-Sleep -Milliseconds 250
            }
            if (-not $ok) { throw "health check failed" }

            $catOk = $false
            for ($i = 0; $i -lt 40; $i++) {
              try {
                $body = & curl.exe -sS --max-time 10 "http://127.0.0.1:8000/v1/catalog" 2>$null
                if ($LASTEXITCODE -eq 0 -and $body -match '"models"') { $catOk = $true; break }
              } catch { }
              Start-Sleep -Milliseconds 250
            }
            if (-not $catOk) { throw "catalog check failed" }
            Write-Host "server smoke ok"
          } finally {
            if ($proc -and -not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }
          }

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build NSIS installer
        working-directory: desktop
        run: cargo tauri build --bundles nsis --target ${{ matrix.triple }}

      - name: Stage stable asset + installer smoke
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $nsis = Get-ChildItem -Path "desktop\src-tauri\target" -Recurse -Filter "*.exe" |
            Where-Object { $_.FullName -match '\\bundle\\nsis\\' } |
            Select-Object -First 1
          if (-not $nsis) {
            Get-ChildItem -Path "desktop\src-tauri\target" -Recurse -Directory -Filter bundle -ErrorAction SilentlyContinue |
              ForEach-Object { Get-ChildItem $_.FullName -Recurse | Select-Object FullName }
            throw "No NSIS .exe under desktop/src-tauri/target"
          }
          Write-Host "Found: $($nsis.FullName)"
          Copy-Item -Force $nsis.FullName "dist\${{ matrix.asset }}"
          $size = (Get-Item "dist\${{ matrix.asset }}").Length
          if ($size -lt 1MB) { throw "installer too small: $size bytes" }
          Write-Host "Staged dist\${{ matrix.asset }} ($([math]::Round($size/1MB,1)) MB)"

          # Silent install into a temp dir when NSIS supports /D=
          $dest = Join-Path $env:RUNNER_TEMP "windhover-install"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $p = Start-Process -FilePath "dist\${{ matrix.asset }}" -ArgumentList "/S","/D=$dest" -Wait -PassThru
          Write-Host "NSIS exit: $($p.ExitCode)"
          $appExe = Get-ChildItem -Path $dest -Recurse -Filter "Windhover.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          $sidecar = Get-ChildItem -Path $dest -Recurse -Filter "windhover-server.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if ($appExe) { Write-Host "Installed app: $($appExe.FullName)" }
          if ($sidecar) {
            Write-Host "Installed sidecar: $($sidecar.FullName)"
            $eng = Get-ChildItem -Path $dest -Recurse -Filter "windhover-engine.exe" -ErrorAction SilentlyContinue |
              Select-Object -First 1
            $env:WINDHOVER_HOST = "127.0.0.1"
            $env:WINDHOVER_PORT = "8001"
            $env:WINDHOVER_APP_NO_AUTOPULL = "1"
            if ($eng) { $env:WINDHOVER_ENGINE = $eng.FullName }
            $proc = Start-Process -FilePath $sidecar.FullName -PassThru -WindowStyle Hidden
            try {
              $ok = $false
              for ($i = 0; $i -lt 90; $i++) {
                if ($proc.HasExited) { throw "installed sidecar exited early code=$($proc.ExitCode)" }
                try {
                  $body = & curl.exe -sS --max-time 3 "http://127.0.0.1:8001/health" 2>$null
                  if ($LASTEXITCODE -eq 0 -and $body -match '"ok"') { $ok = $true; break }
                } catch { }
                Start-Sleep -Milliseconds 250
              }
              if (-not $ok) { throw "installed sidecar health check failed" }
              $catOk = $false
              for ($i = 0; $i -lt 40; $i++) {
                try {
                  $body = & curl.exe -sS --max-time 10 "http://127.0.0.1:8001/v1/catalog" 2>$null
                  if ($LASTEXITCODE -eq 0 -and $body -match '"models"') { $catOk = $true; break }
                } catch { }
                Start-Sleep -Milliseconds 250
              }
              if (-not $catOk) { throw "installed sidecar catalog check failed" }
              Write-Host "installer sidecar smoke ok"
            } finally {
              if ($proc -and -not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }
            }
          } else {
            Write-Host "WARN: windhover-server.exe not found under silent install dir — asset still published"
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/${{ matrix.asset }}
          fail_on_unmatched_files: true
          make_latest: true
          generate_release_notes: true
          body: |
            ## Windhover 0.3.6

            Windows Chat after Library install uses windhover-engine (no torch). See [CHANGELOG.md](https://github.com/cliclye/Windhover/blob/main/CHANGELOG.md).

            ## Download

            ### macOS
            **[Windhover-macOS-arm64.dmg](https://github.com/cliclye/Windhover/releases/latest/download/Windhover-macOS-arm64.dmg)** — Apple Silicon · macOS 12+

            ### Windows 11
            **[Windhover-Windows-x64.exe](https://github.com/cliclye/Windhover/releases/latest/download/Windhover-Windows-x64.exe)** — Intel/AMD 64-bit
            **[Windhover-Windows-arm64.exe](https://github.com/cliclye/Windhover/releases/latest/download/Windhover-Windows-arm64.exe)** — Snapdragon / ARM64

            ### First launch notes
            - **macOS:** unsigned — Gatekeeper may require Open Anyway ([docs/DOWNLOAD.md](https://github.com/cliclye/Windhover/blob/main/docs/DOWNLOAD.md)).
            - **Windows:** unsigned — SmartScreen may require More info → Run anyway.

            ### What's new (0.3.6)
            - Windows: Chat after Library install no longer needs `pip install torch`
            - Windows: engine-first routing + torch-free KPK convert for Phi/Gemma
            - Packaging selfcheck covers hub + numpy/safetensors + chat routing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
