name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  # Product engine: build + token-exact teacher-forcing oracle (fixtures/glm_tiny).
  engine:
    name: Engine build + oracle (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang + OpenMP
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libomp-dev
      - name: Build + oracle
        run: |
          make -C engine clean
          make -C engine test-oracle ARCH=x86-64-v3 CC=clang

  engine-macos:
    name: Engine build + oracle (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install libomp
        run: brew install libomp
      - name: Build + oracle
        run: |
          make -C engine clean
          make -C engine test-oracle ARCH=native

  # Memory / resource-plan path (RAM budget, hard cap, planner) — the
  # optimization layer that keeps models under a hard ceiling.
  memory-budget:
    name: Memory budget + resource plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install clang + OpenMP
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libomp-dev
      - name: Build engine + legacy glm (budget tests)
        run: |
          make -C engine ARCH=x86-64-v3 CC=clang
          make -C c glm ARCH=x86-64-v3
          make -C c tests/test_budget ARCH=x86-64-v3
      - name: Stage glm_tiny fixture for legacy path
        run: |
          # c/glm_tiny is gitignored; reuse the tracked engine fixture.
          rm -rf c/glm_tiny
          cp -R engine/fixtures/glm_tiny c/glm_tiny
          test -f c/ref_glm.json
      - name: Budget unit test
        run: ./c/tests/test_budget
      - name: Memory ceiling adversarial tests
        run: python3 tests/memory_ceiling/test_memory_ceiling.py
      - name: Resource plan unit tests
        run: cd c && python3 -m unittest tests.test_resource_plan tests.test_doctor tests.test_env_defaults -v

  # Legacy Windhover C unit tests (headers / kernels still shared with tools).
  legacy-c:
    name: Legacy C unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build glm
        run: cd c && make glm
      - name: C test suite
        run: cd c && make test-c

  engine-cuda-syntax:
    name: CUDA syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install CUDA toolkit (compiler only)
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          # v0.2.19's version table stops at 12.6.2 — 12.6.3 fails the install
          # step with "Version not available" before nvcc is ever reached.
          cuda: '12.6.2'
          method: network
          sub-packages: '["nvcc"]'
      - name: Compile backend_cuda.cu (syntax only, no GPU)
        run: |
          cd c
          # NOT `nvcc ... | head -40`: a pipeline exits with the status of its
          # LAST command, so head's 0 masked every nvcc error and the job could
          # only ever be green. A check that cannot fail is worse than no check —
          # it buys false confidence in the one file nothing else compiles.
          nvcc -O2 -std=c++17 -arch=sm_80 -c backend_cuda.cu -o /dev/null \
            -Xcompiler=-Wall,-Wextra
          echo "CUDA syntax check passed"

  web:
    name: Web UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npx vitest run

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python test suite
        run: cd c && python3 -m unittest discover -s tests -p 'test_*.py'

  windows-engine:
    name: Windows engine smoke (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          # OpenMP comes via gcc-libs (libgomp); the old *-openmp package was renamed/removed.
          install: mingw-w64-ucrt-x86_64-gcc make
      - name: Build + oracle
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export PATH="/ucrt64/bin:$PATH"
          cd engine
          make -j"$(nproc)"
          make test-oracle
      - name: Build UI + server sidecar smoke
        shell: pwsh
        env:
          WINDHOVER_SERVER_CONSOLE: "1"
        run: |
          Push-Location app
          npm ci
          npm run build
          Pop-Location
          python -m pip install -q pyinstaller
          powershell -File packaging/build_sidecar.ps1 -Triple x86_64-pc-windows-msvc
          $server = "packaging\dist\windhover-server.exe"
          $eng = "engine\windhover-engine.exe"
          $env:WINDHOVER_HOST = "127.0.0.1"
          $env:WINDHOVER_PORT = "8000"
          $env:WINDHOVER_APP_NO_AUTOPULL = "1"
          $env:WINDHOVER_ENGINE = (Resolve-Path $eng).Path
          $proc = Start-Process -FilePath (Resolve-Path $server) -PassThru -WindowStyle Hidden
          try {
            $ok = $false
            for ($i = 0; $i -lt 60; $i++) {
              try {
                $r = Invoke-WebRequest -Uri "http://127.0.0.1:8000/health" -UseBasicParsing -TimeoutSec 2
                if ($r.StatusCode -eq 200 -and $r.Content -match '"ok"') { $ok = $true; break }
              } catch { Start-Sleep -Milliseconds 250 }
            }
            if (-not $ok) { throw "Windows server /health failed" }
            Write-Host "Windows server smoke ok"
          } finally {
            if ($proc -and -not $proc.HasExited) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }
          }
